version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: edtech-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: edtech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edtech-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
